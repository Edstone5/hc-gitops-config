# Service NodePort — expone el servicio de dominio hacia la laptop en el puerto 30100.
apiVersion: v1
kind: Service
metadata:
  name: api-service
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: NodePort
  selector:
    app: hexagonal-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30100
