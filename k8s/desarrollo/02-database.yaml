# Adaptador de salida (base de datos) — se enciende ANTES que el servicio de dominio.
# sync-wave "0": Argo CD espera a que esté Healthy antes de pasar a la wave 1 (la app).
# Demuestra la orquestación de orden de encendido (Sync Waves) del laboratorio.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  labels:
    app: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "pedidos"
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: database-service   # DNS interno que consume el ConfigMap (DB_URL)
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: database
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
