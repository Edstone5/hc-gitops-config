# Adaptador de salida (base de datos MySQL real del proyecto) — arranca ANTES
# que el servicio de dominio. sync-wave "0": Argo CD espera a que esté Healthy
# antes de pasar a la wave 1 (el backend). Demuestra las Sync Waves.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: database
  labels:
    app: database
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root_password"
            - name: MYSQL_DATABASE
              value: "hc_db"
            - name: MYSQL_USER
              value: "hc_user"
            - name: MYSQL_PASSWORD
              value: "hc_password"
          ports:
            - containerPort: 3306
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -u hc_user -phc_password"]
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: database-service   # DNS interno que consume el backend (DATABASE_URL)
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: database
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
