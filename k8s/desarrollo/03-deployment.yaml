# Servicio de dominio (backend real hc-backend) — se enciende DESPUÉS de la BD.
# sync-wave "1". Imagen con tag SemVer INMUTABLE que actualiza el pipeline de CI
# (job gitops-delivery de hc-backend). Probes de salud reales:
#   - liveness: TCP 3000 (proceso vivo).
#   - readiness: GET /health (200 solo si conecta a MySQL; 503 si no).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  labels:
    app: hexagonal-api
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexagonal-api
  template:
    metadata:
      labels:
        app: hexagonal-api
    spec:
      containers:
        - name: pedidos-api
          image: edstone05/hc-backend:v1.1.18
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: hexagonal-config
            - secretRef:
                name: app-secrets
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
