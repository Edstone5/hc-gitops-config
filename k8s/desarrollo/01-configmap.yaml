# Configuración externalizada del microservicio real (hc-backend).
# sync-wave -1: se crea antes que cualquier otro recurso.
# ConfigMap: valores no sensibles.  Secret: credenciales (DATABASE_URL, JWT).
apiVersion: v1
kind: ConfigMap
metadata:
  name: hexagonal-config
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
data:
  NODE_ENV: "production"
  PORT: "3000"
  # ── OpenTelemetry (trazas distribuidas → OTel Collector → Jaeger) ──
  OTEL_SERVICE_NAME: "hc-backend"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.monitoring:4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=historia-clinica,deployment.environment=mvp-desarrollo,service.version=2.1.0"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  # El backend detecta el dialecto desde el esquema de la URL (mysql:// -> MySQL).
  DATABASE_URL: "mysql://hc_user:hc_password@database-service:3306/hc_db"
  JWT_SECRET: "supersecret_jwt_key_change_in_production"
  JWT_REFRESH_SECRET: "supersecret_refresh_key_change_in_production"
